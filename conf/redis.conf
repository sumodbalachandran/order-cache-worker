# Redis configuration — tuned for high-throughput stream workloads

bind 127.0.0.1
port 6379
protected-mode yes

# Memory
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshot
save 900 1
save 300 10
save 60 10000

# Network tuning
tcp-backlog 511
tcp-keepalive 300
timeout 0

# Performance
hz 20
aof-rewrite-incremental-fsync yes
rdb-save-incremental-fsync yes

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log

# Working directory
dir /var/lib/redis
